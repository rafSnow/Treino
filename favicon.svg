<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFB2" />
      <stop offset="100%" stop-color="#00A87D" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="#000000" />
  <g fill="url(#neon)" filter="url(#glow)">
    <!-- Bar -->
    <rect x="191" y="236" width="130" height="40" rx="8" />
    
    <!-- Left Plates -->
    <rect x="149" y="166" width="32" height="180" rx="10" />
    <rect x="115" y="201" width="24" height="110" rx="8" />

    <!-- Right Plates -->
    <rect x="331" y="166" width="32" height="180" rx="10" />
    <rect x="373" y="201" width="24" height="110" rx="8" />
  </g>
</svg>